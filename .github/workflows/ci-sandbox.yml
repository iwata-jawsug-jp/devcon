name: CI (sandbox)

# Sandbox CI: mirror of ci.yml's per-service gates, run on push to sandbox/** unconditionally
# (no path filter, to avoid new-branch diff edge cases). Lets you validate changes on a sandbox
# branch before exercising the sandbox CD apply. Excluded from the public mirror (see release.md).
#
# Shares the same reusable-*.yml job definitions as ci.yml (ADR-0012 / #295) so the two
# workflows can no longer drift the way they had (#153 finding 7). Deliberately does NOT call
# reusable-changes.yml — this file's whole point is to run every area unconditionally, so it
# calls each reusable-<area>.yml directly instead of gating on path-filter output.
on:
  push:
    branches: [sandbox/**]

permissions:
  contents: read

concurrency:
  group: ci-sandbox-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    uses: ./.github/workflows/reusable-backend.yml

  frontend:
    uses: ./.github/workflows/reusable-frontend.yml

  infra:
    uses: ./.github/workflows/reusable-infra.yml

  scripts:
    uses: ./.github/workflows/reusable-scripts.yml

  scaffold:
    uses: ./.github/workflows/reusable-scaffold.yml
