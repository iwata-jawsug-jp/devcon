name: CD App

# Runs after infra exists. Builds & ships the application:
#   preflight  -> check the app-layer repository variables; if any are unset
#                 (infra not applied yet), skip every deploy job explicitly (#145)
#   app-deploy -> build (ECR push) -> migrate (Alembic, one-off Fargate task) ->
#                 deploy-api (ECS roll) -> frontend (S3 sync + CloudFront
#                 invalidation), via reusable-app-deploy.yml (#617, ADR-0023)
# Auth is GitHub OIDC -> the DEPLOY role (NO long-lived AWS keys).
on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - '.github/workflows/cd-app.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cd-app-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # 0) Deploys need repository variables that only exist once the infra layer has
  #    been applied and its outputs registered. Until then, skip (don't fail) so
  #    main stays green (#145).
  #
  #    No separate production infra exists yet (#392): cd-app-sandbox.yml's
  #    resource-identifying variables are registered under a `SANDBOX_` prefix
  #    specifically so they can't collide with this job's unprefixed names
  #    (ECS_CLUSTER etc.) -- with none of those registered, this correctly
  #    reports "not configured" and skips everything below instead of
  #    accidentally deploying against sandbox's resources. Once real
  #    production infra is provisioned, register its outputs under these
  #    unprefixed names and this starts working without any workflow changes.
  preflight:
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      # Local actions (`uses: ./...`) need the repo on disk first -- without
      # this, the step fails with "Can't find 'action.yml'..." before it even
      # runs (#617 regression, caught on main after PR #625 merged).
      - uses: actions/checkout@v7
      - id: check
        uses: ./.github/actions/check-app-vars
        with:
          aws_deploy_role_arn: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          ecr_repository: ${{ vars.ECR_REPOSITORY }}
          ecs_task_family: ${{ vars.ECS_TASK_FAMILY }}
          ecs_cluster: ${{ vars.ECS_CLUSTER }}
          ecs_service: ${{ vars.ECS_SERVICE }}
          private_subnet_ids: ${{ vars.PRIVATE_SUBNET_IDS }}
          app_security_group_id: ${{ vars.APP_SECURITY_GROUP_ID }}
          web_bucket: ${{ vars.WEB_BUCKET }}
          cloudfront_distribution_id: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
          cognito_user_pool_id: ${{ vars.COGNITO_USER_POOL_ID }}
          cognito_client_id: ${{ vars.COGNITO_CLIENT_ID }}
          cognito_domain: ${{ vars.COGNITO_DOMAIN }}
          hint: 'Apply the infra layer and register its outputs (see #145 / docs/infrastructure.md).'

  # 1) build -> migrate -> deploy-api -> frontend (reusable-app-deploy.yml,
  #    #617/ADR-0023). BACKEND_ENABLED/FRONTEND_ENABLED are the same per-area
  #    kill switches as in ci.yml: unset defaults to enabled; only an explicit
  #    'false' skips the area. No `if:` on this job itself (ADR-0012): the
  #    should_run_* inputs gate the reusable workflow's internal jobs instead.
  app-deploy:
    needs: preflight
    permissions:
      id-token: write # OIDC
      contents: read
    uses: ./.github/workflows/reusable-app-deploy.yml
    with:
      should_run_backend: ${{ needs.preflight.outputs.configured == 'true' && vars.BACKEND_ENABLED != 'false' }}
      should_run_frontend: ${{ needs.preflight.outputs.configured == 'true' && vars.FRONTEND_ENABLED != 'false' }}
      ecr_repository: ${{ vars.ECR_REPOSITORY }}
      ecs_cluster: ${{ vars.ECS_CLUSTER }}
      ecs_service: ${{ vars.ECS_SERVICE }}
      ecs_task_family: ${{ vars.ECS_TASK_FAMILY }}
      private_subnet_ids: ${{ vars.PRIVATE_SUBNET_IDS }}
      app_security_group_id: ${{ vars.APP_SECURITY_GROUP_ID }}
      web_bucket: ${{ vars.WEB_BUCKET }}
      cloudfront_distribution_id: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
      cognito_user_pool_id: ${{ vars.COGNITO_USER_POOL_ID }}
      cognito_client_id: ${{ vars.COGNITO_CLIENT_ID }}
      cognito_domain: ${{ vars.COGNITO_DOMAIN }}
      environment: production

  # 2) Real-browser post-deploy smoke test, the "4th gate" (#373/#376,
  #    ADR-0008), rolled out to main. See cd-app-sandbox.yml's smoke-test job
  #    for the full rationale -- this mirrors it, plus files an issue
  #    (labeled e2e-live) on failure instead of just failing quietly, since a
  #    broken main deploy needs a human to notice ("record findings before
  #    fixing", docs/issues.md).
  #
  #    Opt-in via LIVE_SMOKE_ENABLED, defaulting to DISABLED -- the opposite
  #    polarity from BACKEND_ENABLED/FRONTEND_ENABLED (docs/ci-cd-area-switches.md),
  #    which default to enabled. This job blocks a production deploy and
  #    needs infra/bootstrap's ci_deploy_auth CognitoAdminUsers statement
  #    applied first (human, out-of-band); enabling it before that's
  #    confirmed would just fail every main deploy. Set the repository
  #    variable to the string 'true' once ready.
  smoke-test:
    needs: app-deploy
    permissions:
      id-token: write # OIDC, for the disposable Cognito user create/delete
      contents: read
    uses: ./.github/workflows/reusable-live-smoke.yml
    with:
      should_run: ${{ vars.LIVE_SMOKE_ENABLED == 'true' }}
      # empty when CLOUDFRONT_DOMAIN_NAME isn't set yet -- a bare "https://"
      # would defeat the reusable workflow's empty-string "unconfigured" check.
      base_url: ${{ vars.CLOUDFRONT_DOMAIN_NAME != '' && format('https://{0}', vars.CLOUDFRONT_DOMAIN_NAME) || '' }}
      user_pool_id: ${{ vars.COGNITO_USER_POOL_ID }}
      role_arn: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
      environment: production
      # true so cleanup (issue-filing below, delete disposable user) runs even
      # on failure; smoke-test-gate re-fails the check afterward (this is a
      # blocking gate, unlike cd-sandbox-cycle.yml's weekly cycle).
      continue_on_error: true
      unconfigured_hint: docs/infrastructure.md

  # File an issue (docs/issues.md: "record findings before fixing" — a broken
  # main deploy needs a human to notice) and re-fail the check, since
  # reusable-live-smoke.yml's internal continue-on-error above means the
  # smoke-test job itself reports success even when the smoke test failed.
  smoke-test-gate:
    needs: smoke-test
    if: needs.smoke-test.outputs.outcome == 'failure'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: File an issue on failure
        env:
          GH_TOKEN: ${{ github.token }}
          FAILED_STEP: ${{ needs.smoke-test.outputs.failed_step }}
          ARTIFACT_NAME: ${{ needs.smoke-test.outputs.artifact_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "live-smoke gate failed on main ($(echo "${{ github.sha }}" | cut -c1-7))" \
            --label "e2e-live" \
            --body "$(cat <<BODY
          post-deploy の live-smoke E2E ゲート（#376）が \`main\` デプロイ後に失敗しました。

          - **Run**: $RUN_URL
          - **Deploy SHA**: \`${{ github.sha }}\`
          - **失敗したステップ**: $FAILED_STEP

          trace/screenshot/video は Actions artifact（\`$ARTIFACT_NAME\`）に添付されています。docs/issues.md の運用に従い、直す前にこのissueへ原因を記録してください。
          BODY
          )"
      - name: Fail the deploy check
        run: exit 1
