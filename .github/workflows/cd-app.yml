name: CD App

# Runs after infra exists. Builds & ships the application:
#   preflight  -> check the app-layer repository variables; if any are unset
#                 (infra not applied yet), skip every deploy job explicitly (#145)
#   build      -> build backend (services/backend/python) image & push to ECR (tag = commit SHA)
#   migrate    -> register a new api task-def revision with that image, then run
#                 Alembic as a one-off Fargate task on it (gated before the roll)
#   deploy-api -> roll the ECS service to the new revision
#   frontend   -> npm run build, sync dist/ to S3, invalidate CloudFront
# Auth is GitHub OIDC -> the DEPLOY role (NO long-lived AWS keys).
on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - '.github/workflows/cd-app.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cd-app-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-1

jobs:
  # 0) Deploys need repository variables that only exist once the infra layer has
  #    been applied and its outputs registered. Until then, skip (don't fail) so
  #    main stays green (#145).
  #
  #    No separate production infra exists yet (#392): cd-app-sandbox.yml's
  #    resource-identifying variables are registered under a `SANDBOX_` prefix
  #    specifically so they can't collide with this job's unprefixed names
  #    (ECS_CLUSTER etc.) -- with none of those registered, this correctly
  #    reports "not configured" and skips everything below instead of
  #    accidentally deploying against sandbox's resources. Once real
  #    production infra is provisioned, register its outputs under these
  #    unprefixed names and this starts working without any workflow changes.
  preflight:
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - name: Check that the app-layer repository variables are set
        id: check
        env:
          AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          ECS_TASK_FAMILY: ${{ vars.ECS_TASK_FAMILY }}
          ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
          ECS_SERVICE: ${{ vars.ECS_SERVICE }}
          PRIVATE_SUBNET_IDS: ${{ vars.PRIVATE_SUBNET_IDS }}
          APP_SECURITY_GROUP_ID: ${{ vars.APP_SECURITY_GROUP_ID }}
          WEB_BUCKET: ${{ vars.WEB_BUCKET }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
          COGNITO_USER_POOL_ID: ${{ vars.COGNITO_USER_POOL_ID }}
          COGNITO_CLIENT_ID: ${{ vars.COGNITO_CLIENT_ID }}
          COGNITO_DOMAIN: ${{ vars.COGNITO_DOMAIN }}
        run: |
          missing=()
          for v in AWS_DEPLOY_ROLE_ARN ECR_REPOSITORY ECS_TASK_FAMILY ECS_CLUSTER ECS_SERVICE \
                   PRIVATE_SUBNET_IDS APP_SECURITY_GROUP_ID WEB_BUCKET CLOUDFRONT_DISTRIBUTION_ID \
                   COGNITO_USER_POOL_ID COGNITO_CLIENT_ID COGNITO_DOMAIN; do
            [ -n "${!v}" ] || missing+=("$v")
          done
          if [ "${#missing[@]}" -eq 0 ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping deploy — repository variables not set: ${missing[*]}. Apply the infra layer and register its outputs (see #145 / docs/infrastructure.md)."
          fi

  # 1) Build & push the api image to ECR.
  # BACKEND_ENABLED / FRONTEND_ENABLED are the same per-area kill switches as in
  # ci.yml: unset defaults to enabled; only an explicit 'false' skips the area.
  build:
    needs: preflight
    if: ${{ needs.preflight.outputs.configured == 'true' && vars.BACKEND_ENABLED != 'false' }}
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write # OIDC
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Configure AWS credentials (deploy role)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: services/backend/python
          push: true
          tags: ${{ steps.ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 2) Register a new task-def revision with the built image, then run DB
  #    migrations as a one-off Fargate task on it. Gated BEFORE the service roll.
  #    (ECR tags are IMMUTABLE, so a new revision per build is how the new image
  #    actually rolls out — `force-new-deployment` alone would not pick it up.)
  migrate:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write # OIDC
      contents: read
    outputs:
      revision: ${{ steps.reg.outputs.revision }}
    steps:
      - name: Configure AWS credentials (deploy role)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR (for registry URL)
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Register new task definition revision with the built image
        id: reg
        env:
          FAMILY: ${{ vars.ECS_TASK_FAMILY }}
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          image="$REGISTRY/$REPOSITORY:$IMAGE_TAG"
          aws ecs describe-task-definition --task-definition "$FAMILY" \
            --query 'taskDefinition' > taskdef.json
          jq --arg IMG "$image" '
            .containerDefinitions[0].image = $IMG
            | del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)
          ' taskdef.json > newdef.json
          rev=$(aws ecs register-task-definition --cli-input-json file://newdef.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "revision=$rev" >> "$GITHUB_OUTPUT"
          echo "registered: $rev"
      - name: Run Alembic migrations (one-off Fargate task)
        env:
          CLUSTER: ${{ vars.ECS_CLUSTER }}
          REV: ${{ steps.reg.outputs.revision }}
          SUBNETS: ${{ vars.PRIVATE_SUBNET_IDS }}
          SG: ${{ vars.APP_SECURITY_GROUP_ID }}
        run: |
          set -euo pipefail
          task_arn=$(aws ecs run-task --cluster "$CLUSTER" --task-definition "$REV" \
            --launch-type FARGATE --count 1 \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"api","command":["uv","run","--no-sync","alembic","upgrade","head"]}]}' \
            --query 'tasks[0].taskArn' --output text)
          echo "migration task: $task_arn"
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$task_arn"
          code=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$task_arn" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          echo "migration exit code: $code"
          test "$code" = "0"

  # 3) Roll the ECS service onto the new revision (only after migrations succeed).
  deploy-api:
    needs: migrate
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write # OIDC
      contents: read
    steps:
      - name: Configure AWS credentials (deploy role)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Roll the ECS service to the new revision
        env:
          CLUSTER: ${{ vars.ECS_CLUSTER }}
          SERVICE: ${{ vars.ECS_SERVICE }}
          REV: ${{ needs.migrate.outputs.revision }}
        run: |
          set -euo pipefail
          aws ecs update-service --cluster "$CLUSTER" --service "$SERVICE" \
            --task-definition "$REV" >/dev/null
          aws ecs wait services-stable --cluster "$CLUSTER" --service "$SERVICE"
          echo "service rolled to $REV"

  frontend:
    needs: preflight
    if: ${{ needs.preflight.outputs.configured == 'true' && vars.FRONTEND_ENABLED != 'false' }}
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write # OIDC
      contents: read
    defaults:
      run:
        working-directory: services/frontend
    steps:
      - uses: actions/checkout@v7
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: services/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        env:
          VITE_COGNITO_USER_POOL_ID: ${{ vars.COGNITO_USER_POOL_ID }}
          VITE_COGNITO_REGION: ${{ env.AWS_REGION }}
          VITE_COGNITO_CLIENT_ID: ${{ vars.COGNITO_CLIENT_ID }}
          VITE_COGNITO_DOMAIN: ${{ vars.COGNITO_DOMAIN }}
        run: npm run build
      - name: Configure AWS credentials (deploy role)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Sync dist/ to S3
        run: aws s3 sync dist/ "s3://${{ vars.WEB_BUCKET }}/" --delete
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths '/*'

  # 5) Real-browser post-deploy smoke test, the "4th gate" (#373/#376,
  #    ADR-0008), rolled out to main. See cd-app-sandbox.yml's smoke-test job
  #    for the full rationale -- this mirrors it, plus files an issue
  #    (labeled e2e-live) on failure instead of just failing quietly, since a
  #    broken main deploy needs a human to notice ("record findings before
  #    fixing", docs/issues.md).
  #
  #    Opt-in via LIVE_SMOKE_ENABLED, defaulting to DISABLED -- the opposite
  #    polarity from BACKEND_ENABLED/FRONTEND_ENABLED (docs/ci-cd-area-switches.md),
  #    which default to enabled. This job blocks a production deploy and
  #    needs infra/bootstrap's ci_deploy_auth CognitoAdminUsers statement
  #    applied first (human, out-of-band); enabling it before that's
  #    confirmed would just fail every main deploy. Set the repository
  #    variable to the string 'true' once ready.
  smoke-test:
    needs: [deploy-api, frontend]
    if: ${{ vars.LIVE_SMOKE_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write # OIDC, for the disposable Cognito user create/delete
      issues: write # to file an issue on failure
      contents: read
    defaults:
      run:
        working-directory: services/frontend
    steps:
      - uses: actions/checkout@v7
      - name: Check smoke test config
        id: check
        env:
          AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          CLOUDFRONT_DOMAIN_NAME: ${{ vars.CLOUDFRONT_DOMAIN_NAME }}
          COGNITO_USER_POOL_ID: ${{ vars.COGNITO_USER_POOL_ID }}
        run: |
          missing=()
          for v in AWS_DEPLOY_ROLE_ARN CLOUDFRONT_DOMAIN_NAME COGNITO_USER_POOL_ID; do
            [ -n "${!v}" ] || missing+=("$v")
          done
          if [ "${#missing[@]}" -eq 0 ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping smoke test — repository variables not set: ${missing[*]}. See docs/infrastructure.md (#376)."
          fi
      - name: Configure AWS credentials (deploy role)
        if: steps.check.outputs.configured == 'true'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Create a disposable Cognito test user
        if: steps.check.outputs.configured == 'true'
        id: user
        env:
          POOL_ID: ${{ vars.COGNITO_USER_POOL_ID }}
        run: |
          set -euo pipefail
          email="e2e-${{ github.run_id }}-${{ github.run_attempt }}@example.com"
          # openssl's random bytes may not by chance contain every character
          # class Cognito's default password policy requires; the fixed
          # suffix guarantees upper/lower/digit/symbol regardless.
          password="$(openssl rand -base64 24)Aa1!"
          echo "::add-mask::$password"

          aws cognito-idp admin-create-user \
            --user-pool-id "$POOL_ID" --username "$email" \
            --user-attributes Name=email,Value="$email" Name=email_verified,Value=true \
            --message-action SUPPRESS
          aws cognito-idp admin-set-user-password \
            --user-pool-id "$POOL_ID" --username "$email" --password "$password" --permanent

          echo "email=$email" >> "$GITHUB_OUTPUT"
          echo "password=$password" >> "$GITHUB_OUTPUT"
      - name: Set up Node
        if: steps.check.outputs.configured == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: services/frontend/package-lock.json
      - name: Install dependencies
        if: steps.check.outputs.configured == 'true'
        run: npm ci
      - name: Install Playwright Chromium
        if: steps.check.outputs.configured == 'true'
        run: npx playwright install --with-deps chromium
      - name: Run live-smoke test
        if: steps.check.outputs.configured == 'true'
        id: smoke
        continue-on-error: true
        env:
          SMOKE_BASE_URL: https://${{ vars.CLOUDFRONT_DOMAIN_NAME }}
          SMOKE_TEST_EMAIL: ${{ steps.user.outputs.email }}
          SMOKE_TEST_PASSWORD: ${{ steps.user.outputs.password }}
          PLAYWRIGHT_JSON_OUTPUT_NAME: live-smoke-results.json
        run: npx playwright test --project=live-smoke --reporter=list,json
      - name: Find which step failed (S1/S2/S3)
        if: always() && steps.smoke.outcome == 'failure'
        id: parse
        run: |
          # Steps (test.step()) carry their own title+error when one of S2/S3
          # fails; a failure before any step runs (e.g. the accessToken
          # fixture's login itself, effectively "S1") has no step-level
          # title to find, so fall back to attributing it to S1.
          failed_step=$(jq -r '
            ([.. | objects | select(has("error") and .error != null and has("title"))] | .[0].title) //
            (if ([.. | objects | select(has("error") and .error != null)] | length) > 0
              then "S1: login (accessToken fixture)" else empty end) //
            "unknown step"
          ' live-smoke-results.json 2>/dev/null || echo "unknown step")
          [ -n "$failed_step" ] || failed_step="unknown step"
          echo "failed_step=$failed_step" >> "$GITHUB_OUTPUT"
      - name: Upload live-smoke artifacts (trace/screenshot/video)
        if: always() && steps.check.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: live-smoke-report-${{ github.run_id }}
          path: |
            services/frontend/playwright-report/
            services/frontend/test-results/
            services/frontend/live-smoke-results.json
          retention-days: 14
          if-no-files-found: ignore
      - name: File an issue on failure
        if: steps.smoke.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          FAILED_STEP: ${{ steps.parse.outputs.failed_step }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "live-smoke gate failed on main ($(echo "${{ github.sha }}" | cut -c1-7))" \
            --label "e2e-live" \
            --body "$(cat <<BODY
          post-deploy の live-smoke E2E ゲート（#376）が \`main\` デプロイ後に失敗しました。

          - **Run**: $RUN_URL
          - **Deploy SHA**: \`${{ github.sha }}\`
          - **失敗したステップ**: $FAILED_STEP

          trace/screenshot/video は Actions artifact（\`live-smoke-report-${{ github.run_id }}\`）に添付されています。docs/issues.md の運用に従い、直す前にこのissueへ原因を記録してください。
          BODY
          )"
      - name: Delete the disposable Cognito test user
        if: always() && steps.check.outputs.configured == 'true'
        env:
          POOL_ID: ${{ vars.COGNITO_USER_POOL_ID }}
          EMAIL: ${{ steps.user.outputs.email }}
        run: |
          aws cognito-idp admin-delete-user --user-pool-id "$POOL_ID" --username "$EMAIL" \
            || echo "::warning::Failed to delete disposable test user $EMAIL — manual cleanup may be needed."
      - name: Fail the job if the smoke test failed
        if: steps.smoke.outcome == 'failure'
        run: exit 1
