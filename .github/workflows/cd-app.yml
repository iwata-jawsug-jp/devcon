name: CD App

# Runs after infra exists. Builds & ships the application:
#   api -> build image, push to ECR, force a new ECS deployment
#   web -> npm run build, sync dist/ to S3, invalidate CloudFront
# Auth is GitHub OIDC -> the DEPLOY role (NO long-lived AWS keys).
on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - '.github/workflows/cd-app.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cd-app-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-1

jobs:
  api:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write # OIDC
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Configure AWS credentials (deploy role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build & push api image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/$REPOSITORY:$IMAGE_TAG" services/api
          docker push "$REGISTRY/$REPOSITORY:$IMAGE_TAG"
      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --service "${{ vars.ECS_SERVICE }}" \
            --force-new-deployment

  web:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write # OIDC
      contents: read
    defaults:
      run:
        working-directory: services/web
    steps:
      - uses: actions/checkout@v5
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: services/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Configure AWS credentials (deploy role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Sync dist/ to S3
        run: aws s3 sync dist/ "s3://${{ vars.WEB_BUCKET }}/" --delete
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths '/*'
