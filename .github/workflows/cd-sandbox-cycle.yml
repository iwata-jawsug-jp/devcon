name: CD Sandbox Cycle (weekly ephemeral)

# PR④ of #376: apply -> deploy -> live-smoke -> teardown in one workflow run,
# to verify sandbox can be built from scratch on a recurring basis without a
# human remembering to run docs/sandbox.md by hand. This is the mechanical
# version of "a third party can stand up the environment from docs alone"
# (#299) and specifically targets provisioning-only defects (#436/#437-class:
# only reproduce on a from-scratch apply, invisible on a long-lived
# environment) plus docs/sandbox.md procedure drift.
#
# workflow_dispatch only, deliberately no `schedule` trigger yet -- same
# convention as metrics-dora.yml/perf.yml (docs/infrastructure.md "定期実行
# ワークフローについて"), plus a sandbox-specific reason: `TF_ENV=sandbox` is
# a single shared state key (docs/sandbox.md), so an unattended weekly
# teardown could destroy someone's in-progress manual sandbox verification
# without warning. Add `schedule` only once this has been run successfully by
# hand at least once, its duration/cost is understood, and nothing else is
# relying on a long-lived sandbox at the time.
#
# Mechanical guard against exactly that accident (#631 problem 2, ADR-0025):
# the `apply` job runs `terraform state list` before the real apply. A
# non-empty state means the shared `sandbox` state already has resources in
# it from something else (a human's docs/sandbox.md verification, or a stuck
# previous run) -- proceeding would silently adopt/modify that environment
# and then `teardown` would destroy it without warning. The job stops there
# unless re-run with `-f confirm_shared_state=proceed`, same "typed
# confirmation, not just workflow_dispatch itself" pattern as
# cd-infra-sandbox.yml's `confirm_destroy`. Critically, `teardown` only runs
# when `apply` actually reached a real `terraform apply` (its `applied`
# output) -- see `teardown`'s `if:` comment for why this matters.
#
# The check deliberately uses "state is non-empty" rather than "terraform
# plan has no diff" (sandbox verification of an earlier revision of this
# guard): api.tf's `data.external.api_current_image` looks up the image tag
# the ECS service is actually running so infra-only applies don't clobber a
# real deploy's task-def revision with the ":bootstrap" placeholder (#374) --
# which means a real, currently-in-use environment (deployed via
# cd-app-sandbox.yml/reusable-app-deploy.yml, same as this workflow's own
# `app-deploy` job) *always* shows a task-definition diff on the next plan.
# A "no diff" check would essentially never fire for the actual "someone is
# using this" scenario it exists to catch -- a false negative in exactly the
# case that matters, found only by running the full cycle for real. "State
# is non-empty" trades a coarser check (it can't tell a fully-healthy
# environment from a partially-failed previous run) for one that reliably
# catches the real danger; given the asymmetry -- a false positive costs a
# human 30 seconds to confirm, a false negative destroys someone's
# environment -- that trade is the right one.
#
# The `apply`/`teardown` steps still duplicate cd-infra-sandbox.yml's Terraform
# steps (tfvars materialization is shared via materialize-tfvars, #617/ADR-0023,
# but init/apply/destroy themselves are not extracted here). The app delivery
# steps (build -> migrate -> deploy-api -> frontend) are shared with
# cd-app.yml/cd-app-sandbox.yml/cd-app-verify.yml via reusable-app-deploy.yml
# (#617, ADR-0023).
#
# Judgment on fail = alerting (auto-file an `e2e-live` issue), not blocking:
# same Count -> Block staged rollout as WAF (#279). Promote once false-positive
# rate has been observed for a while.
on:
  workflow_dispatch:
    inputs:
      skip_teardown:
        description: 'Skip the final destroy step (leave the sandbox environment up for investigation)'
        required: false
        type: boolean
        default: false
      confirm_shared_state:
        description: 'Type "proceed" only if you have confirmed nothing else is using sandbox right now AND still want to continue when terraform plan finds the shared sandbox state already fully provisioned (see docs/sandbox.md)'
        required: false
        type: string
        default: ''

permissions:
  contents: read

concurrency:
  group: cd-sandbox-cycle
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-1
  TF_ENV: sandbox

jobs:
  # 1) Provision sandbox infra from scratch (same steps as cd-infra-sandbox.yml's
  #    `apply` job).
  apply:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: infra
    # Every apply provisions the VPC/CloudFront/Cognito/etc. from scratch, so
    # AWS-assigned IDs (subnets, security group, CloudFront distribution,
    # Cognito pool/client) differ on every run -- unlike cd-app-sandbox.yml,
    # which deploys onto a long-lived sandbox/* environment whose IDs were
    # captured once into repo variables by hand. Downstream jobs here must
    # read this run's actual `terraform output`, not those repo variables
    # (#482: relying on the stale vars caused deploy-api/frontend to fail with
    # InvalidSubnetID.NotFound / NoSuchDistribution).
    outputs:
      # Set only after a real `terraform apply` ran (i.e. the shared-state guard
      # above did not block). `teardown` gates on this -- see its `if:` comment.
      applied: ${{ steps.mark_applied.outputs.applied }}
      ecr_repository: ${{ steps.tf_outputs.outputs.ecr_repository }}
      ecs_cluster_name: ${{ steps.tf_outputs.outputs.ecs_cluster_name }}
      ecs_service_name: ${{ steps.tf_outputs.outputs.ecs_service_name }}
      ecs_task_family: ${{ steps.tf_outputs.outputs.ecs_task_family }}
      private_subnet_ids: ${{ steps.tf_outputs.outputs.private_subnet_ids }}
      app_security_group_id: ${{ steps.tf_outputs.outputs.app_security_group_id }}
      cognito_user_pool_id: ${{ steps.tf_outputs.outputs.cognito_user_pool_id }}
      cognito_user_pool_client_id: ${{ steps.tf_outputs.outputs.cognito_user_pool_client_id }}
      cognito_hosted_ui_domain_prefix: ${{ steps.tf_outputs.outputs.cognito_hosted_ui_domain_prefix }}
      web_bucket: ${{ steps.tf_outputs.outputs.web_bucket }}
      cloudfront_distribution_id: ${{ steps.tf_outputs.outputs.cloudfront_distribution_id }}
      cloudfront_domain_name: ${{ steps.tf_outputs.outputs.cloudfront_domain_name }}
    steps:
      - uses: actions/checkout@v7
      - name: Configure AWS credentials (deploy role)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Materialize backend + tfvars from committed examples
        # Unlike cd-infra-sandbox.yml (which runs on a sandbox/* branch that
        # commits them once by hand), this workflow runs from `main` via
        # workflow_dispatch (docs/sandbox.md) where they never exist on disk --
        # render them at runtime same as cd-infra.yml.
        uses: ./.github/actions/materialize-tfvars
        with:
          tf_env: ${{ env.TF_ENV }}
          state_bucket: ${{ vars.AWS_TF_STATE_BUCKET }}
          project_name: ${{ vars.PROJECT_NAME }}
      # Version pinned to match .devcontainer/Dockerfile's TERRAFORM_VERSION — the
      # single source of truth (same convention as TFLINT_VERSION/TRIVY_VERSION/
      # CONFTEST_VERSION); update both together.
      #
      # terraform_wrapper: false -- the default wrapper captures stdout/stderr
      # into step outputs, but to do so it ALWAYS exits 0 itself regardless of
      # the real terraform exit code, breaking any check below that reads a
      # terraform command's real exit status via `$?`/pipefail (caught via
      # sandbox verification against an earlier, `-detailed-exitcode`-based
      # revision of this guard, #631 problem 2 / ADR-0025).
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: '1.13.0'
          terraform_wrapper: false
      - name: Terraform init
        run: terraform init -backend-config=env/${{ env.TF_ENV }}.backend.hcl
      # Detect a pre-existing shared state before mutating it (#631 problem 2,
      # ADR-0025). A non-empty `terraform state list` means the shared state
      # already has resources in it -- see the guard rationale in this file's
      # header comment for why this checks state emptiness rather than
      # `terraform plan` having no diff.
      - name: Check for pre-existing shared sandbox state
        id: check_shared_state
        run: |
          set -o pipefail
          if ! resource_count=$(terraform state list | wc -l); then
            echo "::error::terraform state list failed while checking for a pre-existing shared sandbox state."
            exit 1
          fi
          echo "resource_count=$resource_count" >> "$GITHUB_OUTPUT"
      - name: Guard against overwriting an already-provisioned shared sandbox state
        if: steps.check_shared_state.outputs.resource_count != '0'
        env:
          CONFIRM: ${{ inputs.confirm_shared_state }}
          RESOURCE_COUNT: ${{ steps.check_shared_state.outputs.resource_count }}
        run: |
          if [ "$CONFIRM" != "proceed" ]; then
            echo "::error::terraform state already has $RESOURCE_COUNT resource(s) -- the shared 'sandbox' Terraform state (TF_ENV=sandbox) is not empty, most likely because someone's manual docs/sandbox.md verification or a stuck previous run left it populated. Continuing would silently adopt/modify that environment and the teardown job would then destroy it without warning. Confirm nothing else is using sandbox right now, then re-run with -f confirm_shared_state=proceed. See docs/sandbox.md."
            exit 1
          fi
          echo "::warning::Proceeding despite a non-empty shared sandbox state ($RESOURCE_COUNT resource(s), confirm_shared_state=proceed)."
      - name: Terraform apply
        run: |
          terraform apply -no-color -input=false -auto-approve \
            -var-file=env/${{ env.TF_ENV }}.tfvars
      - name: Mark that a real apply happened
        id: mark_applied
        run: echo "applied=true" >> "$GITHUB_OUTPUT"
      - name: Export terraform outputs for downstream jobs
        id: tf_outputs
        run: |
          {
            echo "ecr_repository=$(terraform output -raw name_prefix)-api"
            echo "ecs_cluster_name=$(terraform output -raw ecs_cluster_name)"
            echo "ecs_service_name=$(terraform output -raw ecs_service_name)"
            echo "ecs_task_family=$(terraform output -raw ecs_task_family)"
            echo "private_subnet_ids=$(terraform output -json private_subnet_ids | jq -r 'join(",")')"
            echo "app_security_group_id=$(terraform output -raw app_security_group_id)"
            echo "cognito_user_pool_id=$(terraform output -raw cognito_user_pool_id)"
            echo "cognito_user_pool_client_id=$(terraform output -raw cognito_user_pool_client_id)"
            echo "cognito_hosted_ui_domain_prefix=$(terraform output -raw cognito_hosted_ui_domain_prefix)"
            echo "web_bucket=$(terraform output -raw web_bucket)"
            echo "cloudfront_distribution_id=$(terraform output -raw cloudfront_distribution_id)"
            echo "cloudfront_domain_name=$(terraform output -raw cloudfront_domain_name)"
          } >> "$GITHUB_OUTPUT"

  # 2) build -> migrate -> deploy-api -> frontend against the freshly-applied
  #    sandbox infra (reusable-app-deploy.yml, #617/ADR-0023). Resource IDs
  #    come from this run's own `terraform output` (job 1), not repo
  #    variables -- see the `apply` job's comment above (#482).
  app-deploy:
    needs: apply
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/reusable-app-deploy.yml
    with:
      ecr_repository: ${{ needs.apply.outputs.ecr_repository }}
      ecs_cluster: ${{ needs.apply.outputs.ecs_cluster_name }}
      ecs_service: ${{ needs.apply.outputs.ecs_service_name }}
      ecs_task_family: ${{ needs.apply.outputs.ecs_task_family }}
      private_subnet_ids: ${{ needs.apply.outputs.private_subnet_ids }}
      app_security_group_id: ${{ needs.apply.outputs.app_security_group_id }}
      web_bucket: ${{ needs.apply.outputs.web_bucket }}
      cloudfront_distribution_id: ${{ needs.apply.outputs.cloudfront_distribution_id }}
      cognito_user_pool_id: ${{ needs.apply.outputs.cognito_user_pool_id }}
      cognito_client_id: ${{ needs.apply.outputs.cognito_user_pool_client_id }}
      cognito_domain: ${{ needs.apply.outputs.cognito_hosted_ui_domain_prefix }}
      # sandbox has no Application Auto Scaling, same reasoning as
      # cd-app-sandbox.yml.
      desired_count: '1'

  # 3) Real-browser live-smoke against the just-provisioned-from-scratch
  #    environment (same steps as cd-app-sandbox.yml's `smoke-test` job, plus
  #    cd-app.yml's fail -> auto-file-issue step since this cycle has no PR to
  #    comment on). continue-on-error so teardown still runs on smoke failure.
  smoke-test:
    needs: [apply, app-deploy]
    permissions:
      id-token: write # OIDC, for the disposable Cognito user create/delete
      contents: read
    uses: ./.github/workflows/reusable-live-smoke.yml
    with:
      base_url: ${{ needs.apply.outputs.cloudfront_domain_name != '' && format('https://{0}', needs.apply.outputs.cloudfront_domain_name) || '' }}
      user_pool_id: ${{ needs.apply.outputs.cognito_user_pool_id }}
      role_arn: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
      # true (alerting, not blocking, per the Count -> Block note above): a
      # failure here must not stop teardown from running (`needs: smoke-test`
      # + `if: always()` below).
      continue_on_error: true
      artifact_name_prefix: sandbox-cycle-live-smoke-report
      unconfigured_hint: docs/sandbox.md

  # File an issue on failure (alerting only -- unlike cd-app.yml's
  # smoke-test-gate, this does not fail the check; teardown must still run).
  file-issue-on-smoke-failure:
    needs: smoke-test
    if: needs.smoke-test.outputs.outcome == 'failure'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: File an issue on failure
        env:
          GH_TOKEN: ${{ github.token }}
          FAILED_STEP: ${{ needs.smoke-test.outputs.failed_step }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Weekly sandbox cycle: live-smoke failed after a from-scratch apply" \
            --label "e2e-live" \
            --body "$(cat <<BODY
          週次エフェメラルサイクル（#376 PR④）で、ゼロからの sandbox プロビジョニング後の
          live-smoke が失敗しました。post-deploy スモーク（cd-app-sandbox.yml/cd-app.yml）
          では検出できない「ゼロからのプロビジョニング特有の欠陥」（#436/#437 と同クラス）の
          可能性があります。

          - **Run**: $RUN_URL
          - **失敗したステップ**: $FAILED_STEP

          trace/screenshot/video は Actions artifact に添付されています。docs/issues.md の
          運用に従い、直す前にこのissueへ原因を記録してください。
          BODY
          )"

  # 4) Tear down everything this run created, so the cycle actually stays
  #    ephemeral (docs/sandbox.md: sandbox is meant to be disposable). Runs
  #    regardless of smoke-test outcome (alerting, not blocking, per the
  #    Count -> Block note above) unless the human explicitly asked to keep
  #    the environment up for investigation.
  #
  #    `needs.apply.outputs.applied == 'true'` is required, not optional: this
  #    job only `needs: smoke-test`, and `if: always()` runs regardless of
  #    whether jobs in its transitive needs chain (apply, app-deploy,
  #    smoke-test) succeeded, failed, OR were skipped -- so without this extra
  #    check, a shared-state guard trip in `apply` (this run never actually
  #    applied anything) would still let this job authenticate independently
  #    and run `terraform destroy` against whatever is currently in the shared
  #    state, i.e. exactly the accident the guard exists to prevent (#631
  #    problem 2, ADR-0025). Same reasoning applies to any other reason `apply`
  #    fails before reaching its real `terraform apply` step (e.g. the OIDC ref
  #    constraint below): teardown is now skipped rather than attempted.
  teardown:
    needs: smoke-test
    if: always() && inputs.skip_teardown != true && needs.apply.outputs.applied == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v7
      - name: Configure AWS credentials (deploy role)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Materialize backend + tfvars from committed examples
        # See the apply job above: rendered at runtime since this workflow runs
        # from `main`, not a sandbox/* branch that commits these git-ignored files.
        uses: ./.github/actions/materialize-tfvars
        with:
          tf_env: ${{ env.TF_ENV }}
          state_bucket: ${{ vars.AWS_TF_STATE_BUCKET }}
          project_name: ${{ vars.PROJECT_NAME }}
      # Version pinned to match .devcontainer/Dockerfile's TERRAFORM_VERSION — the
      # single source of truth (same convention as TFLINT_VERSION/TRIVY_VERSION/
      # CONFTEST_VERSION); update both together.
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: '1.13.0'
      - name: Terraform init
        run: terraform init -backend-config=env/${{ env.TF_ENV }}.backend.hcl
      - name: Terraform destroy
        run: |
          terraform destroy -no-color -input=false -auto-approve \
            -var-file=env/${{ env.TF_ENV }}.tfvars
