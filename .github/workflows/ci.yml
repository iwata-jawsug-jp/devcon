name: CI

# Mirrors the Makefile / pre-commit gates so "green locally" == "green in CI". Per-area gate
# logic lives in reusable-*.yml (workflow_call, ADR-0012 / #295) so this file, ci-sandbox.yml,
# and downstream consumers all share a single source instead of copy-drifting (#153 finding 7).
#
# NOTE: calling a job via `uses:` changes its status-check context name to
# "<this job's name> / check" (verified empirically — see ADR-0012). Each area job below is
# ALWAYS invoked (no `if:` on the caller side); the skip decision is passed in as the
# `should_run` input instead, so the reported check name stays "<area> / check" whether the
# job actually runs or is skipped internally. Gating with `if:` here would instead make GitHub
# report the bare "<area>" (no " / check" suffix) when skipped — a different context string
# that the main-ci-required ruleset would never see, permanently blocking merges for any PR
# where that area is legitimately skipped (discovered the hard way while rolling this out).
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read # dorny/paths-filter reads PR changed files via the GitHub API

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which areas changed so per-service jobs only run when relevant.
  changes:
    uses: ./.github/workflows/reusable-changes.yml

  # Per-area kill switches: repository variables BACKEND_ENABLED / FRONTEND_ENABLED /
  # INFRA_ENABLED gate both CI and CD jobs for that area. Compared with `!= 'false'`
  # so an unset variable (e.g. on the public mirror / forks) defaults to enabled.
  backend:
    needs: changes
    uses: ./.github/workflows/reusable-backend.yml
    with:
      should_run: ${{ needs.changes.outputs.backend == 'true' && vars.BACKEND_ENABLED != 'false' }}

  frontend:
    needs: changes
    uses: ./.github/workflows/reusable-frontend.yml
    with:
      should_run: ${{ needs.changes.outputs.frontend == 'true' && vars.FRONTEND_ENABLED != 'false' }}

  infra:
    needs: changes
    uses: ./.github/workflows/reusable-infra.yml
    with:
      should_run: ${{ needs.changes.outputs.infra == 'true' && vars.INFRA_ENABLED != 'false' }}

  scripts:
    needs: changes
    uses: ./.github/workflows/reusable-scripts.yml
    with:
      should_run: ${{ needs.changes.outputs.scripts == 'true' }}

  # #294: copier.yml から実際に生成し、生成物が壊れていないことを検証する（置換漏れ・
  # terraform validate・backend lint・frontend lint/test）。エリアスイッチの対象外
  # （docs/ci-cd-area-switches.md の「対象外」節。scripts ジョブと同じ扱い）。
  scaffold:
    needs: changes
    uses: ./.github/workflows/reusable-scaffold.yml
    with:
      should_run: ${{ needs.changes.outputs.scaffold == 'true' }}
