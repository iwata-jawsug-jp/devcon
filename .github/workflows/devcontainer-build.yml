name: Devcontainer build

# .devcontainer/Dockerfile をビルドして GHCR へ push し、devcontainer.json の build.cacheFrom
# が参照する事前ビルド済みレイヤーを用意する（#532）。目的は開発用リポジトリではなく
# 公開ミラー（iwata-jawsug-jp/devcon）で devcontainer 初回起動を速くすること — devcon
# 自身は自分の名前空間（iwata-jawsug-jp/devcon）に push しても誰も参照しない（devcontainer.json の
# cacheFrom は publish 時に tools/script/publish-to-public.sh の文字列変換で
# ghcr.io/iwata-jawsug-jp/devcon/... に書き換わる。docs/release.md 参照）ため、
# below の job-level if で iwata-jawsug-jp/devcon 以外では常にスキップする。
#
# copier で生成したプロジェクトにこのワークフロー自体は不要（生成先は独自の GHCR 名前空間を
# 持たず、公開ミラーの正規イメージを cacheFrom として共有する設計 — #532 の議論参照）なので
# copier.yml の _exclude 対象にしている。
on:
  push:
    branches: [main]
    paths:
      - '.devcontainer/**'
      - '.github/workflows/devcontainer-build.yml'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: devcontainer-build
  cancel-in-progress: false

jobs:
  build-and-push:
    if: github.repository == 'iwata-jawsug-jp/devcon'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
      - name: Build & push devcontainer image
        uses: docker/build-push-action@v7
        with:
          context: .devcontainer
          push: true
          tags: |
            ghcr.io/iwata-jawsug-jp/devcon/devcontainer:latest
            ghcr.io/iwata-jawsug-jp/devcon/devcontainer:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/iwata-jawsug-jp/devcon/devcontainer:latest
          cache-to: type=registry,ref=ghcr.io/iwata-jawsug-jp/devcon/devcontainer:latest,mode=max
