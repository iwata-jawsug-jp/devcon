name: Devcontainer build

# .devcontainer/Dockerfile をビルドして GHCR（ghcr.io/iwata-jawsug-jp/devcon/devcontainer）へ
# push する（#532）。devcontainer.json の build.cacheFrom は :buildcache タグ（実イメージの
# :latest とは別）を、devcon・公開ミラー（iwata-jawsug-jp/devcon）・copier 生成先の
# すべてが共通のキャッシュ元として参照する設計（#536 で devcon 自身が参照する
# cacheFrom を自分の未公開の名前空間ではなくこの canonical なイメージに向ける形へ修正済み）。
# push 先はこの1箇所に固定するため、publish-to-public.sh の文字列変換には依存しない
# （この文字列は `iwata-jawsug-jp/devcon` を含まないため変換の対象にもならない）。
#
# ビルド・push 自体は公開ミラー（iwata-jawsug-jp/devcon）でだけ実行する。devcon
# 自身では below の job-level if で常にスキップする（GITHUB_TOKEN に他組織の GHCR への
# 書き込み権限は無く、そもそも実行してはいけない）。
#
# copier で生成したプロジェクトにこのワークフロー自体は不要（生成先は独自の GHCR 名前空間を
# 持たず、公開ミラーの正規イメージを cacheFrom として共有する設計 — #532 の議論参照）なので
# copier.yml の _exclude 対象にしている。
on:
  push:
    branches: [main]
    paths:
      - '.devcontainer/**'
      - '.github/workflows/devcontainer-build.yml'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: devcontainer-build
  cancel-in-progress: false

jobs:
  build-and-push:
    if: github.repository == 'iwata-jawsug-jp/devcon'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
      - name: Build & push devcontainer image
        uses: docker/build-push-action@v7
        with:
          context: .devcontainer
          push: true
          tags: |
            ghcr.io/iwata-jawsug-jp/devcon/devcontainer:latest
            ghcr.io/iwata-jawsug-jp/devcon/devcontainer:${{ github.sha }}
          # cache-to/cache-from は tags と別タグ（:buildcache）にする。同じ:latestを共有すると
          # cache-to（mode=max）が書き込む buildkit cacheconfig manifest が実イメージを
          # 上書きしてしまい、:latest が「docker run できない、キャッシュメタデータだけの
          # 参照」になる（#536 で実機発生・確認）。devcontainer.json の cacheFrom もこの
          # :buildcache を参照する。
          cache-from: type=registry,ref=ghcr.io/iwata-jawsug-jp/devcon/devcontainer:buildcache
          cache-to: type=registry,ref=ghcr.io/iwata-jawsug-jp/devcon/devcontainer:buildcache,mode=max
