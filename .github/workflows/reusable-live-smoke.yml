name: reusable-live-smoke

# #376 (ADR-0008): the "4th gate" -- a real-browser Cognito Hosted UI login +
# authenticated API call against a just-deployed environment. Extracted from
# cd-app-sandbox.yml / cd-app.yml / cd-sandbox-cycle.yml, which had each grown
# their own copy of this job (the exact drift #295/ADR-0012 was created to stop
# happening again, this time for a CD gate instead of a CI one).
#
# This workflow is a mechanism only -- it runs the smoke test and reports what
# happened via outputs. Policy (blocking vs. alerting, whether/how to file an
# issue on failure, the opt-in switch) stays in each caller, since that differs
# per environment (see cd-app-sandbox.yml / cd-app.yml / cd-sandbox-cycle.yml).

on:
  workflow_call:
    inputs:
      should_run:
        description: 'Whether to actually execute (vs. report a skipped check). See ADR-0012 for why this is an input rather than an `if:` on the calling job.'
        type: boolean
        required: false
        default: true
      base_url:
        description: 'https:// URL of the just-deployed environment (e.g. the CloudFront domain).'
        type: string
        required: true
      user_pool_id:
        description: 'Cognito user pool ID to create/delete the disposable test user in.'
        type: string
        required: true
      role_arn:
        description: 'AWS deploy role ARN to assume via OIDC (needs cognito-idp:AdminCreateUser/AdminSetUserPassword/AdminDeleteUser, infra/bootstrap/main.tf).'
        type: string
        required: true
      environment: # GitHub Environment for protection rules; '' = none.
        type: string
        required: false
        default: ''
      continue_on_error:
        description: 'false (default) = a smoke-test failure fails this job (blocking gate). true = the job still succeeds so the caller can alert instead (e.g. file an issue) without failing the deploy.'
        type: boolean
        required: false
        default: false
      artifact_name_prefix:
        type: string
        required: false
        default: 'live-smoke-report'
      unconfigured_hint:
        description: 'Doc pointer shown in the warning when base_url/user_pool_id/role_arn are empty (repo variables not set yet).'
        type: string
        required: false
        default: 'docs/sandbox.md or docs/infrastructure.md'
    outputs:
      outcome:
        description: 'success / failure / skipped'
        value: ${{ jobs.check.outputs.outcome }}
      failed_step:
        description: 'Which of S1/S2/S3 failed (best-effort parse), or empty when outcome != failure.'
        value: ${{ jobs.check.outputs.failed_step }}
      artifact_name:
        description: 'Name of the uploaded trace/screenshot/video artifact (empty when skipped).'
        value: ${{ jobs.check.outputs.artifact_name }}

permissions:
  contents: read

jobs:
  check:
    if: inputs.should_run
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write # OIDC, for the disposable Cognito user create/delete
      contents: read
    defaults:
      run:
        working-directory: services/frontend
    outputs:
      outcome: ${{ steps.outcome.outputs.outcome }}
      failed_step: ${{ steps.parse.outputs.failed_step }}
      artifact_name: ${{ steps.outcome.outputs.artifact_name }}
    steps:
      - uses: actions/checkout@v7
      - name: Check smoke test config
        id: config
        env:
          BASE_URL: ${{ inputs.base_url }}
          USER_POOL_ID: ${{ inputs.user_pool_id }}
          ROLE_ARN: ${{ inputs.role_arn }}
        run: |
          if [ -n "$BASE_URL" ] && [ -n "$USER_POOL_ID" ] && [ -n "$ROLE_ARN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping live-smoke — base_url/user_pool_id/role_arn not all set. See ${{ inputs.unconfigured_hint }} (#376)."
          fi
      - name: Configure AWS credentials (deploy role)
        if: steps.config.outputs.configured == 'true'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ inputs.role_arn }}
          aws-region: ap-northeast-1
      - name: Create a disposable Cognito test user
        if: steps.config.outputs.configured == 'true'
        id: user
        env:
          POOL_ID: ${{ inputs.user_pool_id }}
        run: |
          set -euo pipefail
          email="e2e-${{ github.run_id }}-${{ github.run_attempt }}@example.com"
          # openssl's random bytes may not by chance contain every character
          # class Cognito's default password policy requires; the fixed
          # suffix guarantees upper/lower/digit/symbol regardless.
          password="$(openssl rand -base64 24)Aa1!"
          echo "::add-mask::$password"

          aws cognito-idp admin-create-user \
            --user-pool-id "$POOL_ID" --username "$email" \
            --user-attributes Name=email,Value="$email" Name=email_verified,Value=true \
            --message-action SUPPRESS
          aws cognito-idp admin-set-user-password \
            --user-pool-id "$POOL_ID" --username "$email" --password "$password" --permanent

          echo "email=$email" >> "$GITHUB_OUTPUT"
          echo "password=$password" >> "$GITHUB_OUTPUT"
      - name: Set up Node
        if: steps.config.outputs.configured == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: services/frontend/package-lock.json
      - name: Install dependencies
        if: steps.config.outputs.configured == 'true'
        run: npm ci
      - name: Install Playwright Chromium
        if: steps.config.outputs.configured == 'true'
        run: npx playwright install --with-deps chromium
      - name: Run live-smoke test
        if: steps.config.outputs.configured == 'true'
        id: smoke
        continue-on-error: ${{ inputs.continue_on_error }}
        env:
          SMOKE_BASE_URL: ${{ inputs.base_url }}
          SMOKE_TEST_EMAIL: ${{ steps.user.outputs.email }}
          SMOKE_TEST_PASSWORD: ${{ steps.user.outputs.password }}
          PLAYWRIGHT_JSON_OUTPUT_NAME: live-smoke-results.json
        run: npx playwright test --project=live-smoke --reporter=list,json
      - name: Find which step failed (S1/S2/S3)
        if: always() && steps.config.outputs.configured == 'true' && steps.smoke.outcome == 'failure'
        id: parse
        run: |
          # Steps (test.step()) carry their own title+error when one of S2/S3
          # fails; a failure before any step runs (e.g. the accessToken
          # fixture's login itself, effectively "S1") has no step-level
          # title to find, so fall back to attributing it to S1.
          failed_step=$(jq -r '
            ([.. | objects | select(has("error") and .error != null and has("title"))] | .[0].title) //
            (if ([.. | objects | select(has("error") and .error != null)] | length) > 0
              then "S1: login (accessToken fixture)" else empty end) //
            "unknown step"
          ' live-smoke-results.json 2>/dev/null || echo "unknown step")
          [ -n "$failed_step" ] || failed_step="unknown step"
          echo "failed_step=$failed_step" >> "$GITHUB_OUTPUT"
      - name: Upload live-smoke artifacts (trace/screenshot/video)
        if: always() && steps.config.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name_prefix }}-${{ github.run_id }}
          path: |
            services/frontend/playwright-report/
            services/frontend/test-results/
            services/frontend/live-smoke-results.json
          retention-days: 14
          if-no-files-found: ignore
      - name: Delete the disposable Cognito test user
        if: always() && steps.config.outputs.configured == 'true'
        env:
          POOL_ID: ${{ inputs.user_pool_id }}
          EMAIL: ${{ steps.user.outputs.email }}
        run: |
          aws cognito-idp admin-delete-user --user-pool-id "$POOL_ID" --username "$EMAIL" \
            || echo "::warning::Failed to delete disposable test user $EMAIL — manual cleanup may be needed."
      - name: Set outcome output
        if: always()
        id: outcome
        run: |
          if [ "${{ steps.config.outputs.configured }}" != "true" ]; then
            outcome="skipped"
            artifact_name=""
          else
            outcome="${{ steps.smoke.outcome }}"
            artifact_name="${{ inputs.artifact_name_prefix }}-${{ github.run_id }}"
          fi
          echo "outcome=$outcome" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"
