name: CD Infra

# Terraform plan on PRs (posted as a PR comment); apply is run manually.
# Auth is GitHub OIDC -> an IAM role assumed per job (NO long-lived AWS keys):
#   - PRs assume the read-only PLAN role.
#   - apply assumes the DEPLOY role. It is NOT triggered by merge to main:
#     required-reviewer environment gating needs a paid plan on a private repo,
#     so apply is gated behind a manual workflow_dispatch instead — prod is never
#     provisioned without a deliberate human run.
on:
  pull_request:
    paths:
      - 'infra/**'
      - '.github/workflows/cd-infra.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cd-infra-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-1
  # Plan against dev on PRs; the deploy job overrides to prod.
  TF_ENV: dev

jobs:
  # INFRA_ENABLED is the same per-area kill switch as in ci.yml: unset defaults
  # to enabled; only an explicit 'false' skips plan AND apply (even manual runs).
  plan:
    if: ${{ github.event_name == 'pull_request' && vars.INFRA_ENABLED != 'false' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC
      contents: read
      pull-requests: write # post plan comment
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v7
      - name: Configure AWS credentials (plan role)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_PLAN_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Materialize backend + tfvars from committed examples
        # backend.hcl / *.tfvars are git-ignored, so render them at runtime from the
        # committed .example templates. No secrets enter git or the logs: the bucket
        # name is a repo variable, and the RDS master password is RDS-managed
        # (Secrets Manager), never present in tfvars or state.
        run: |
          sed -e "s|REPLACE-ME-tfstate|${{ vars.AWS_TF_STATE_BUCKET }}|" \
              -e "s|devcon|${{ vars.PROJECT_NAME }}|g" \
            "env/${TF_ENV}.backend.hcl.example" > "env/${TF_ENV}.backend.hcl"
          sed "s|devcon|${{ vars.PROJECT_NAME }}|g" \
            "env/${TF_ENV}.tfvars.example" > "env/${TF_ENV}.tfvars"
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: '1.13.0'
      - name: Terraform init
        run: terraform init -backend-config=env/${{ env.TF_ENV }}.backend.hcl
      - name: Terraform plan
        id: plan
        run: |
          terraform plan -no-color -input=false \
            -var-file=env/${{ env.TF_ENV }}.tfvars \
            -out=tfplan | tee plan.txt
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      # Render the plan as JSON once; both the IAM check below and conftest (#296) consume it.
      - name: Render plan JSON
        run: terraform show -json tfplan > plan.json
      # Static IAM policy validation (#340, #338): catches condition keys /
      # other structural issues in aws_iam_policy / aws_iam_role_policy
      # documents that terraform validate/tflint/checkov can't see (the
      # policy is syntactically valid either way) -- only the app layer's
      # single such resource (ecs_execution_secret, shared.tf). infra/bootstrap/
      # is CI-external (local apply only, docs/infrastructure.md), so its
      # own IAM policies are validated separately:
      #   cd infra/bootstrap && terraform show -json terraform.tfstate > /tmp/bootstrap-iam-plan.json
      #   python3 .github/scripts/check_iam_policies.py /tmp/bootstrap-iam-plan.json
      - name: IAM policy validation (accessanalyzer)
        run: python3 ../.github/scripts/check_iam_policies.py plan.json
      # Policy as Code (#296, ADR-0017): org-specific conventions (tags, IAM wildcard
      # actions, ...) that generic scanners (tflint/checkov/trivy) can't express. Blocking
      # from day 1 -- see ADR-0017 for why this differs from WAF's (#279) Count->Block
      # staged rollout.
      # Version pinned to match .devcontainer/Dockerfile's CONFTEST_VERSION (#153, #272 —
      # same single-source convention as TFLINT_VERSION/TRIVY_VERSION).
      - name: Set up conftest
        run: |
          curl -fsSL "https://github.com/open-policy-agent/conftest/releases/download/v0.68.2/conftest_0.68.2_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin conftest
      - name: Policy as Code (conftest)
        run: |
          conftest verify --policy policy
          conftest test --policy policy plan.json
      - name: Post plan as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/plan.txt', 'utf8');
            // Sticky marker: update the same comment on repeat pushes instead of
            // piling up a new one every time (#306).
            const marker = '<!-- cd-infra-plan:' + process.env.TF_ENV + ' -->';
            const body = [
              marker,
              '#### Terraform Plan (`' + process.env.TF_ENV + '`) 📖',
              '```hcl',
              plan.length > 60000 ? plan.slice(0, 60000) + '\n... (truncated)' : plan,
              '```',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const existing = comments.find((c) => c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

  apply:
    if: ${{ github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && vars.INFRA_ENABLED != 'false' && vars.INFRA_APPLY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    # Manual-only (workflow_dispatch) — this IS the gate. The `production`
    # environment records the deployment; required-reviewer gating would need a
    # paid plan on a private repo. The `ref` check is the only real guard: the
    # deploy role's OIDC trust also accepts `environment:production`, so without
    # it a workflow_dispatch from ANY branch could assume the deploy role (#301).
    #
    # INFRA_APPLY_ENABLED is a second, narrower key on top of INFRA_ENABLED:
    # opt-in (defaults to disabled), unlike INFRA_ENABLED's opt-out default
    # (docs/ci-cd-area-switches.md). It only gates this `apply` job — ci.yml's
    # infra lint job and this workflow's `plan` job keep running by default via
    # INFRA_ENABLED, since they make no AWS changes. `apply` provisions real
    # prod infra, including the IAM permissions cd-app.yml's smoke-test job
    # depends on (LIVE_SMOKE_ENABLED), so a stray/rehearsed workflow_dispatch
    # shouldn't apply until someone deliberately flips this too.
    environment: production
    permissions:
      id-token: write # OIDC
      contents: read
    defaults:
      run:
        working-directory: infra
    env:
      TF_ENV: prod
    steps:
      - uses: actions/checkout@v7
      - name: Configure AWS credentials (deploy role)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Materialize backend + tfvars from committed examples
        # See the plan job: render git-ignored backend.hcl / *.tfvars from the
        # committed .example templates at runtime; no secrets in git or logs.
        run: |
          sed -e "s|REPLACE-ME-tfstate|${{ vars.AWS_TF_STATE_BUCKET }}|" \
              -e "s|devcon|${{ vars.PROJECT_NAME }}|g" \
            "env/${TF_ENV}.backend.hcl.example" > "env/${TF_ENV}.backend.hcl"
          sed "s|devcon|${{ vars.PROJECT_NAME }}|g" \
            "env/${TF_ENV}.tfvars.example" > "env/${TF_ENV}.tfvars"
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: '1.13.0'
      - name: Terraform init
        run: terraform init -backend-config=env/${{ env.TF_ENV }}.backend.hcl
      - name: Terraform apply
        run: |
          terraform apply -no-color -input=false -auto-approve \
            -var-file=env/${{ env.TF_ENV }}.tfvars
