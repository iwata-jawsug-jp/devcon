# Run `pre-commit install` once to enable. See `make hooks`.
# Update hook versions with `pre-commit autoupdate`.
minimum_pre_commit_version: "3.5.0"

repos:
  # ---- General hygiene ----
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ---- Terraform ----
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.99.0
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
      - id: terraform_tflint
        args:
          - "--args=--config=__GIT_WORKING_DIR__/.tflint.hcl"
      - id: terraform_checkov
        args:
          - "--args=--quiet"
          - "--args=--compact"
      - id: terraform_trivy
        args:
          - "--args=--severity=HIGH,CRITICAL"

  # ---- Python (ruff: lint + format) ----
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^services/api/
      - id: ruff-format
        files: ^services/api/

  # ---- Node / TypeScript / web assets (prettier) ----
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: \.(ts|tsx|js|jsx|json|yaml|yml|md)$
        exclude: ^(services/web/dist/|.*\.terraform/)
