# Run `pre-commit install` once to enable. See `make hooks`.
# Update hook versions with `pre-commit autoupdate`.
minimum_pre_commit_version: '3.5.0'

repos:
  # ---- General hygiene ----
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--allow-multiple-documents']
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=1024']
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']

  # ---- Terraform ----
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.99.0
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
      - id: terraform_tflint
        args:
          - '--args=--config=__GIT_WORKING_DIR__/.tflint.hcl'
      # Informational (--soft-fail), matching `make security` and CI's soft_fail —
      # remaining findings are deliberate cost/scope trade-offs (see issue #111).
      - id: terraform_checkov
        args:
          - '--args=--quiet'
          - '--args=--compact'
          - '--args=--soft-fail'
      # Blocking, like `make security` and CI — accepted findings live in
      # .trivyignore with reasons (#150).
      - id: terraform_trivy
        args:
          - '--args=--severity=HIGH,CRITICAL'
          - '--args=--ignorefile=__GIT_WORKING_DIR__/.trivyignore'

  # ---- Python (ruff: lint + format) ----
  # .github/scripts/ has no dependencies of its own (stdlib-only tooling scripts), so it
  # has no pyproject.toml — ruff falls back to its defaults there, which is fine for it.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff
        args: ['--fix']
        files: ^(services/backend/python/|\.github/scripts/)
      - id: ruff-format
        files: ^(services/backend/python/|\.github/scripts/)

  # ---- Node / TypeScript / web assets (prettier) ----
  # Uses the frontend's own prettier (version pinned by services/frontend/package.json +
  # package-lock.json) so the hook and `npm run format` always agree. Requires
  # services/frontend/node_modules (installed by `make setup`); fails with a clear
  # "Executable ... not found" otherwise. Deliberately NOT `npx`: npx silently falls back
  # to fetching prettier@latest from the registry when node_modules is missing.
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: services/frontend/node_modules/.bin/prettier --write --ignore-unknown
        language: system
        files: \.(ts|tsx|js|jsx|mjs|cjs|vue|json|yaml|yml|md|html|css)$
        # .claude/skills/ and .kiro/settings/templates/ are cc-sdd upstream artifacts
        # (docs/sdd.md) — leave them unformatted to keep diffs vs upstream small (#127).
        exclude: ^(services/frontend/dist/|services/frontend/src/api/schema\.ts|services/frontend/playwright-report/|.*\.terraform/|\.claude/skills/|\.kiro/settings/templates/)
      # Catches a scope added to the Cognito resource server (or the frontend's login
      # scope list) without updating the other side — only reproduces at a real Cognito
      # login otherwise (#438). Only runs when either file actually changes.
      - id: check-oauth-scopes
        name: check-oauth-scopes (auth.tf vs oidcConfig.ts)
        entry: python3 .github/scripts/check_oauth_scopes.py
        language: system
        files: ^(infra/auth\.tf|services/frontend/src/auth/oidcConfig\.ts)$
        pass_filenames: false
